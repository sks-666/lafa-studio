<template id="scene10-post-credit-hook-template">
  <div
    data-composition-id="scene10-post-credit-hook"
    data-width="1920"
    data-height="1080"
    data-duration="3"
  >
    <div class="canvas">
      <div class="bg"></div>
      <div class="overlay"></div>
      <div class="grain"></div>
      <div class="label">Post-credit hook</div>
      <div class="title">Something watched from the storm</div>
      <div class="subtitle">To be continued.</div>
    </div>

    <style>
      [data-composition-id="scene10-post-credit-hook"] .canvas {
        width: 1920px;
        height: 1080px;
        background-color: #0a0a0f;
        position: relative;
        overflow: hidden;
        font-family: "Inter", Arial, sans-serif;
      }

      [data-composition-id="scene10-post-credit-hook"] .bg {
        position: absolute;
        inset: 0;
        background-image: url("../assets/10_post_credit_hook.png");
        background-size: cover;
        background-position: center;
        transform-origin: center center;
      }

      [data-composition-id="scene10-post-credit-hook"] .overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 60% 25%, rgba(255, 196, 100, 0.18), transparent 35%),
          linear-gradient(90deg, rgba(0,0,0,.68), rgba(0,0,0,.08), rgba(0,0,0,.38)),
          linear-gradient(to bottom, rgba(0,0,0,.05), rgba(0,0,0,.65));
      }

      [data-composition-id="scene10-post-credit-hook"] .grain {
        position: absolute;
        inset: 0;
        opacity: 0.12;
        background-image:
          radial-gradient(rgba(255,255,255,.45) 1px, transparent 1px);
        background-size: 4px 4px;
        mix-blend-mode: overlay;
      }

      [data-composition-id="scene10-post-credit-hook"] .label {
        position: absolute;
        left: 96px;
        top: 76px;
        color: #ffd18a;
        font-size: 24px;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-weight: 800;
      }

      [data-composition-id="scene10-post-credit-hook"] .title {
        position: absolute;
        left: 90px;
        bottom: 150px;
        max-width: 980px;
        color: #ffffff;
        font-size: 70px;
        line-height: 0.98;
        font-weight: 800;
        letter-spacing: -2.8px;
        text-shadow: 0 12px 45px rgba(0,0,0,.8);
      }

      [data-composition-id="scene10-post-credit-hook"] .subtitle {
        position: absolute;
        left: 96px;
        bottom: 88px;
        max-width: 1100px;
        color: #eaf0ff;
        font-size: 32px;
        line-height: 1.25;
        font-weight: 500;
        text-shadow: 0 8px 30px rgba(0,0,0,.8);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });

        const root = '[data-composition-id="scene10-post-credit-hook"]';
        const bg = root + " .bg";
        const label = root + " .label";
        const title = root + " .title";
        const subtitle = root + " .subtitle";
        const grain = root + " .grain";

        tl.set(bg, { scale: 1.08 });
        tl.set([label, title, subtitle], { opacity: 0, y: 46 });

        tl.to(bg, { scale: 1.0, duration: 3, ease: "none" }, 0);
        tl.to(label, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.2);
        tl.to(title, { opacity: 1, y: 0, duration: 0.75, ease: "power3.out" }, 0.35);
        tl.to(subtitle, { opacity: 1, y: 0, duration: 0.75, ease: "power3.out" }, 0.5);
        tl.to(grain, { opacity: 0.2, duration: 3/2, yoyo: true, repeat: 1 }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene10-post-credit-hook"] = tl;
      })();
    </script>
  </div>
